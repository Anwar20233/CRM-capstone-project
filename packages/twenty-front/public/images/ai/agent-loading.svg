<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" style="background: transparent; width: 100%; max-width: 300px; height: auto;">
  <defs>
    <style>
      .main-drop {
        fill: #C87453;
        transform-origin: 100px 95px;
        animation: drop-cycle 2.0s infinite linear;
      }

      @keyframes drop-cycle {
        0% {
          transform: translateY(-55px) scaleX(0.85) scaleY(1.1);
          opacity: 1;
        }
        8% {
          transform: translateY(-48px) scaleX(0.86) scaleY(1.08);
          opacity: 1;
        }
        20% {
          transform: translateY(-25px) scaleX(0.88) scaleY(1.06);
          opacity: 1;
        }
        32% {
          transform: translateY(-5px) scaleX(1.2) scaleY(0.7);
          opacity: 1;
        }
        38% {
          transform: translateY(0px) scaleX(1.8) scaleY(0.3);
          opacity: 1;
        }
        44% {
          transform: translateY(0px) scaleX(2.2) scaleY(0.1);
          opacity: 0;
        }
        70% {
          transform: translateY(-55px) scaleX(0) scaleY(0);
          opacity: 0;
        }
        82% {
          transform: translateY(-55px) scaleX(0.4) scaleY(0.45);
          opacity: 0.35;
        }
        92% {
          transform: translateY(-55px) scaleX(0.72) scaleY(0.9);
          opacity: 0.8;
        }
        100% {
          transform: translateY(-55px) scaleX(0.85) scaleY(1.1);
          opacity: 1;
        }
      }

      .ripple {
        fill: none;
        stroke: #C87453;
        transform-origin: 100px 95px;
        animation: ripple-expand 2.0s infinite ease-out;
      }
      .ripple-1 { animation-delay: 0s; }
      .ripple-2 { animation-delay: 0.15s; }

      @keyframes ripple-expand {
        0%, 32% {
          transform: scaleX(0.05) scaleY(0.05);
          opacity: 0;
        }
        38% {
          transform: scaleX(0.15) scaleY(0.15);
          opacity: 0.7;
        }
        75% {
          transform: scaleX(0.9) scaleY(0.9);
          opacity: 0.2;
        }
        95%, 100% {
          transform: scaleX(1.1) scaleY(1.1);
          opacity: 0;
        }
      }

      .splash { fill: #C87453; transform-origin: 100px 95px; }

      .splash-1 { animation: splash-left 2.0s infinite linear; }
      @keyframes splash-left {
        0%, 35% { transform: translate(0, 0) scale(0); opacity: 0; }
        38% { transform: translate(-4px, -5px) scale(0.5); opacity: 0.5; }
        44% { transform: translate(-20px, -25px) scale(1); opacity: 0.9; }
        54% { transform: translate(-28px, -42px) scale(0.9); opacity: 0.85; }
        65% { transform: translate(-20px, -52px) scale(0.7); opacity: 0.7; }
        80% { transform: translate(-4px, -55px) scale(0.25); opacity: 0.3; }
        90% { transform: translate(0, -55px) scale(0); opacity: 0; }
        100% { transform: translate(0, -55px) scale(0); opacity: 0; }
      }

      .splash-2 { animation: splash-right 2.0s infinite linear; }
      @keyframes splash-right {
        0%, 35% { transform: translate(0, 0) scale(0); opacity: 0; }
        38% { transform: translate(5px, -6px) scale(0.5); opacity: 0.5; }
        44% { transform: translate(22px, -27px) scale(1.1); opacity: 0.9; }
        54% { transform: translate(30px, -44px) scale(1); opacity: 0.85; }
        65% { transform: translate(22px, -53px) scale(0.7); opacity: 0.7; }
        80% { transform: translate(4px, -55px) scale(0.25); opacity: 0.3; }
        90% { transform: translate(0, -55px) scale(0); opacity: 0; }
        100% { transform: translate(0, -55px) scale(0); opacity: 0; }
      }

      .splash-3 { animation: splash-center 2.0s infinite linear; }
      @keyframes splash-center {
        0%, 35% { transform: translate(0, 0) scale(0); opacity: 0; }
        38% { transform: translate(1px, -8px) scale(0.6); opacity: 0.5; }
        44% { transform: translate(2px, -32px) scale(1.2); opacity: 0.95; }
        54% { transform: translate(2px, -52px) scale(1); opacity: 0.9; }
        65% { transform: translate(1px, -58px) scale(0.8); opacity: 0.75; }
        80% { transform: translate(0px, -56px) scale(0.3); opacity: 0.35; }
        90% { transform: translate(0, -55px) scale(0); opacity: 0; }
        100% { transform: translate(0, -55px) scale(0); opacity: 0; }
      }

      .splash-4 { animation: splash-far-left 2.0s infinite linear; }
      @keyframes splash-far-left {
        0%, 36% { transform: translate(0, 0) scale(0); opacity: 0; }
        39% { transform: translate(-8px, -3px) scale(0.4); opacity: 0.4; }
        46% { transform: translate(-32px, -18px) scale(0.8); opacity: 0.7; }
        54% { transform: translate(-36px, -32px) scale(0.7); opacity: 0.65; }
        65% { transform: translate(-25px, -47px) scale(0.5); opacity: 0.5; }
        80% { transform: translate(-5px, -54px) scale(0.15); opacity: 0.2; }
        90% { transform: translate(0, -55px) scale(0); opacity: 0; }
        100% { transform: translate(0, -55px) scale(0); opacity: 0; }
      }

      .splash-5 { animation: splash-far-right 2.0s infinite linear; }
      @keyframes splash-far-right {
        0%, 36% { transform: translate(0, 0) scale(0); opacity: 0; }
        39% { transform: translate(7px, -3px) scale(0.4); opacity: 0.4; }
        46% { transform: translate(30px, -16px) scale(0.7); opacity: 0.7; }
        54% { transform: translate(34px, -30px) scale(0.6); opacity: 0.6; }
        65% { transform: translate(23px, -46px) scale(0.45); opacity: 0.5; }
        80% { transform: translate(5px, -54px) scale(0.15); opacity: 0.2; }
        90% { transform: translate(0, -55px) scale(0); opacity: 0; }
        100% { transform: translate(0, -55px) scale(0); opacity: 0; }
      }
    </style>
  </defs>

  <g>
    <ellipse cx="100" cy="95" rx="70" ry="16" class="ripple ripple-1" />
    <ellipse cx="100" cy="95" rx="70" ry="16" class="ripple ripple-2" />
  </g>

  <g>
    <circle cx="100" cy="95" r="3" class="splash splash-1" />
    <circle cx="100" cy="95" r="3.2" class="splash splash-2" />
    <circle cx="100" cy="95" r="3.8" class="splash splash-3" />
    <circle cx="100" cy="95" r="2" class="splash splash-4" />
    <circle cx="100" cy="95" r="2.2" class="splash splash-5" />
  </g>

  <circle cx="100" cy="95" r="7" class="main-drop" />
</svg>
