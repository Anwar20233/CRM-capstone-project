# Development infrastructure services only (Postgres + Redis).
# Use this when developing locally against the source code.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down       # stop
#   docker compose -f docker-compose.dev.yml down -v    # stop + wipe data

name: twenty-dev

services:
  db:
    image: postgres:16
    volumes:
      - dev-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: default
    healthcheck:
      test: pg_isready -U postgres -h localhost -d postgres
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ["--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # The single Python AI service (NER today, agent routes later). Heavy
  # (~1.3 GB of model weights download on first start), so it's behind the
  # "ai" profile and only starts with: docker compose --profile ai up -d
  ai-service:
    profiles: ["ai"]
    build:
      context: ../twenty-ai-service
    ports:
      - "8001:8001"
    volumes:
      - dev-ai-hf-cache:/app/.cache/huggingface
    restart: unless-stopped

volumes:
  dev-db-data:
  dev-ai-hf-cache:
